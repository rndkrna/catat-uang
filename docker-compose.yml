version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Add your environment variables here
      # - DATABASE_URL=postgresql://...
      # - WHATSAPP_API_KEY=...
      # - JWT_SECRET=...
    restart: unless-stopped

